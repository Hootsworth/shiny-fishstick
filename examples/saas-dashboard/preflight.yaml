version: 1.0.0
site: http://localhost:8001
actions:
  login:
    description: Authenticates session credentials
    action_type: browser
    selector: '#login-submit-btn'
    parameters:
      - name: email
        type: string
        required: true
        selector: '#email'
      - name: password
        type: string
        required: true
        selector: '#password'
  filter_metrics:
    description: Filter performance monitor logs table
    action_type: browser
    selector: '#saas-filter-btn'
    parameters:
      - name: q
        type: string
        required: true
        selector: '#saas-query'
