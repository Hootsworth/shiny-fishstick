# Ruff linting and formatting configuration
target-version = "py310"
line-length = 120
exclude = ["shared", "venv", ".git", "__pycache__"]

[lint]
# Enable Pyflakes (F), Pycodestyle (E, W), and Isort (I)
select = ["E", "F", "W", "I"]
ignore = ["E501", "E402"]

[format]
quote-style = "double"
indent-style = "space"
