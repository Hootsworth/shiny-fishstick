name-template: 'v$RESOLVED_VERSION 🐟'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🌐 Compatibility & Adapters'
    labels:
      - 'compatibility'
  - title: '🧰 Maintenance & CI'
    labels:
      - 'ci'
      - 'chore'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
      - 'docs'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## What's Changed

  $CHANGES
