name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install ruff

    - name: Run Ruff Lint Check
      run: |
        ruff check .

    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Run Test Suite with Pytest Coverage
      run: |
        python -m pytest --cov=backend/app --cov-report=term-missing tests/

  verify-docker-builds:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7

    - name: Verify Backend Docker Build
      run: |
        docker build -t preflight-backend:latest -f backend/Dockerfile .

    - name: Verify Frontend Docker Build
      run: |
        docker build -t preflight-frontend:latest ./frontend
