version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./preflight.db:/app/preflight.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  mock-store:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    command: uvicorn backend.mock_site.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
