version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: preflight-db
    environment:
      POSTGRES_DB: preflight
      POSTGRES_USER: preflight_user
      POSTGRES_PASSWORD: preflight_password_secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: preflight-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: preflight-backend
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://preflight_user:preflight_password_secure@db:5432/preflight
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    restart: always

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: preflight-worker
    command: python -m backend.app.worker
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://preflight_user:preflight_password_secure@db:5432/preflight
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: preflight-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
